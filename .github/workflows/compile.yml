name: Typst Derleme
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typst Compile
        uses: chataigne/setup-typst@v1

      - name: Run Typst
        run: typst compile main.typ output.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf-dosyasi
          path: output.pdf
